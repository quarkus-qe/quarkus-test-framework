---
apiVersion: "v1"
kind: "List"
items:
  - apiVersion: "v1"
    kind: "Service"
    metadata:
      name: "${SERVICE_NAME}"
    spec:
      ports:
        - name: "http"
          port: ${INTERNAL_INGRESS_PORT}
          targetPort: ${INTERNAL_PORT}
        - name: "https"
          port: 8443
          targetPort: ${TLS_PORT}
      selector:
        deployment: "${SERVICE_NAME}"
      type: "ClusterIP"
  - apiVersion: "apps/v1"
    kind: "Deployment"
    metadata:
      name: "${SERVICE_NAME}"
    spec:
      replicas: 1
      selector:
        matchLabels:
          deployment: "${SERVICE_NAME}"
      template:
        metadata:
          labels:
            deployment: "${SERVICE_NAME}"
        spec:
          containers:
            - image: "${IMAGE}"
              args: [${ARGS}]
              imagePullPolicy: "IfNotPresent"
              name: "${SERVICE_NAME}"
              ports:
                - containerPort: ${INTERNAL_PORT}
                  name: "http"
                  protocol: "TCP"
                - containerPort: ${TLS_PORT}
                  name: "https"
                  protocol: "TCP"
      triggers:
        - type: "ConfigChange"
  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${SERVICE_NAME}-tls
    spec:
      to:
        kind: Service
        name: ${SERVICE_NAME}
      port:
        targetPort: 8443
      tls:
        termination: passthrough
      